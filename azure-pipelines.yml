# Azure DevOps CI/CD Pipeline for .NET Web Application
# This pipeline includes CI (Continuous Integration) and CD (Continuous Deployment)

trigger:
  branches:
    include:
      - main
      - master
      - develop
  paths:
    exclude:
      - README.md
      - '*.md'

pr:
  branches:
    include:
      - main
      - master
      - develop

variables:
  # Container Registry variables - Update these based on your setup
  dockerRegistryServiceConnection: 'YOUR_ACR_SERVICE_CONNECTION_NAME'  # Service connection name for Azure Container Registry
  imageRepository: 'mywebapp'
  containerRegistry: 'YOUR_ACR_NAME.azurecr.io'  # Your Azure Container Registry URL
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  
  # Azure Deployment variables - Update these based on your target environment
  azureSubscription: 'YOUR_AZURE_SERVICE_CONNECTION_NAME'  # Service connection for Azure resources
  appServiceName: 'YOUR_APP_SERVICE_NAME'  # Azure App Service name
  resourceGroup: 'YOUR_RESOURCE_GROUP_NAME'  # Azure Resource Group name
  
  # Agent-based deployment variables
  vmImage: 'ubuntu-latest'

stages:
  # Stage 1: Build and Test (.NET Application)
  - stage: Build
    displayName: 'Build and Test Stage'
    jobs:
      - job: BuildJob
        displayName: 'Build .NET Application'
        pool:
          vmImage: $(vmImage)
        
        steps:
          - task: UseDotNet@2
            displayName: 'Use .NET 8.0 SDK'
            inputs:
              packageType: 'sdk'
              version: '8.0.x'
          
          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet packages'
            inputs:
              command: 'restore'
              projects: '**/*.csproj'
          
          - task: DotNetCoreCLI@2
            displayName: 'Build .NET Application'
            inputs:
              command: 'build'
              projects: '**/*.csproj'
              arguments: '--configuration Release --no-restore'
          
          - task: DotNetCoreCLI@2
            displayName: 'Run Unit Tests'
            inputs:
              command: 'test'
              projects: '**/*Tests/**/*.csproj'
              arguments: '--configuration Release --no-build --collect:"XPlat Code Coverage"'
            continueOnError: true  # Continue even if tests fail (remove this in production)
          
          - task: DotNetCoreCLI@2
            displayName: 'Publish .NET Application'
            inputs:
              command: 'publish'
              publishWebProjects: true
              arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)/publish'
          
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Build Artifacts'
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)/publish'
              artifactName: 'drop'
              publishLocation: 'Container'

  # Stage 2: Build Docker Image
  - stage: BuildDocker
    displayName: 'Build Docker Image Stage'
    dependsOn: Build
    jobs:
      - job: DockerBuildJob
        displayName: 'Build and Push Docker Image'
        pool:
          vmImage: $(vmImage)
        
        steps:
          - checkout: self
          
          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(imageRepository)
              command: 'build'
              Dockerfile: $(dockerfilePath)
              tags: |
                $(tag)
                latest
          
          - task: Docker@2
            displayName: 'Push Docker Image to ACR'
            inputs:
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(imageRepository)
              command: 'push'
              tags: |
                $(tag)
                latest

  # Stage 3: Deploy to Azure (Using Service Connection)
  - stage: DeployToAzure
    displayName: 'Deploy to Azure App Service (Service Connection)'
    dependsOn: BuildDocker
    condition: succeeded()
    jobs:
      - deployment: DeployToAppService
        displayName: 'Deploy Docker Container to Azure App Service'
        pool:
          vmImage: $(vmImage)
        environment: 'Production'  # You can create environments in Azure DevOps
        
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy to Azure App Service'
                  inputs:
                    azureSubscription: $(azureSubscription)
                    appName: $(appServiceName)
                    containers: |
                      $(containerRegistry)/$(imageRepository):$(tag)
                    deployToSlotOrASE: false
                    # Uncomment if you want to deploy to a slot
                    # slotName: 'staging'

  # Stage 4: Deploy using Azure DevOps Agent (Alternative deployment method)
  - stage: DeployWithAgent
    displayName: 'Deploy using Azure DevOps Agent'
    dependsOn: BuildDocker
    condition: succeeded()
    jobs:
      - job: AgentDeployment
        displayName: 'Pull and Run Container on Agent'
        pool:
          # Use your self-hosted agent pool name here
          # For cloud-hosted agents, use: vmImage: $(vmImage)
          name: 'YOUR_AGENT_POOL_NAME'  # Replace with your agent pool name
        
        steps:
          - script: |
              echo "Logging into container registry..."
              # Login to ACR using service connection credentials
              # In a real scenario, you would use Azure CLI or docker login with service principal
              echo "Pulling Docker image..."
              docker pull $(containerRegistry)/$(imageRepository):$(tag)
            displayName: 'Pull Docker Image'
          
          - script: |
              echo "Stopping existing container if running..."
              docker stop mywebapp || true
              docker rm mywebapp || true
              
              echo "Running new container..."
              docker run -d \
                --name mywebapp \
                -p 8080:8080 \
                --restart unless-stopped \
                $(containerRegistry)/$(imageRepository):$(tag)
            displayName: 'Run Docker Container'
          
          - script: |
              echo "Verifying container is running..."
              docker ps | grep mywebapp
              docker logs mywebapp --tail 50
            displayName: 'Verify Deployment'

